<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Hotel Shiv International</title>
    <script>
      var repo = '/hotel-shiv-international';
      var l = window.location;
      var path = l.pathname.replace(repo, '') || '/';
      var query = l.search.slice(1);
      var hash = l.hash.slice(1);
      var redirectUrl = repo + '/?p=' + encodeURIComponent(path) +
        (query ? '&q=' + encodeURIComponent(query) : '') +
        (hash ? '&h=' + encodeURIComponent(hash) : '');
      l.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
